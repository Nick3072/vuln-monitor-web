<html lang="ko"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>로그인 — Vuln Monitor</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css"/><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/><style>body { font-feature-settings: &quot;cv11&quot;, &quot;ss01&quot;; word-break: keep-all; }</style></head><body><div class="page page-center"><div class="container-tight py-4"><div class="text-center mb-4"><a href="/" class="navbar-brand navbar-brand-autodark text-decoration-none"><i class="ti ti-shield-check text-primary me-2" style="font-size:2rem"></i><span class="fw-bold fs-3">Vuln Monitor</span></a></div><div class="card card-md"><div class="card-body"><h2 class="h2 text-center mb-1">운영자 로그인</h2><p class="text-muted text-center mb-1 small">취약점 모니터링 시스템 — 등록된 운영자만 접근할 수 있습니다.</p><p class="text-muted text-center mb-3 small">관리자가 설정한 비밀번호를 입력하세요. <a href="https://example.com/help" target="_blank" rel="noopener">사용 안내</a></p><form method="post" action="/login"><div class="mb-3"><label class="form-label required">아이디</label><input type="text" name="username" class="form-control" placeholder="아이디 입력" autocomplete="username" autofocus="" required=""/></div><div class="mb-3"><label class="form-label required">비밀번호</label><div class="input-group input-group-flat"><input type="password" id="login-password" name="password" class="form-control" placeholder="비밀번호 입력" autocomplete="current-password" required=""/><span class="input-group-text"><a href="#" class="link-secondary js-pw-toggle" data-target="#login-password" title="비밀번호 표시" aria-label="비밀번호 표시"><i class="ti ti-eye"></i></a></span></div><small class="form-hint text-warning d-none js-capslock"><i class="ti ti-alert-triangle me-1"></i>Caps Lock이 켜져 있습니다.</small></div><input type="hidden" name="next" value="/"/><div class="form-footer"><button type="submit" class="btn btn-primary w-100"><i class="ti ti-login-2 me-2"></i>로그인</button></div></form></div></div><div class="text-center text-muted mt-3 small"><i class="ti ti-help-circle me-1"></i>비밀번호를 모르시면 <a href="mailto:security@example.com">security@example.com</a> 로 문의하세요.</div></div></div><script defer="" src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/js/tabler.min.js"></script><script>(function () {
  function setup() {
    // 1) 비밀번호 표시 토글
    document.querySelectorAll('a.js-pw-toggle').forEach(function (toggle) {
      toggle.addEventListener('click', function (e) {
        e.preventDefault();
        var selector = toggle.getAttribute('data-target');
        if (!selector) return;
        // 클릭 시점에 조회 — type 이 바뀌어도 동작.
        var input = document.querySelector(selector);
        if (!input) return;
        var isPassword = input.getAttribute('type') === 'password';
        input.setAttribute('type', isPassword ? 'text' : 'password');
        var icon = toggle.querySelector('i');
        if (icon) {
          if (isPassword) {
            icon.classList.remove('ti-eye');
            icon.classList.add('ti-eye-off');
          } else {
            icon.classList.remove('ti-eye-off');
            icon.classList.add('ti-eye');
          }
        }
      });
    });

    // 2) Caps Lock 경고
    function handleCapsLock(e) {
      var input = e.currentTarget;
      var form = input.closest('form');
      if (!form) return;
      var warning = form.querySelector('.js-capslock');
      if (!warning) return;
      var capsOn = typeof e.getModifierState === 'function' && e.getModifierState('CapsLock');
      if (capsOn) {
        warning.classList.remove('d-none');
      } else {
        warning.classList.add('d-none');
      }
    }
    document.querySelectorAll('input[type=password]').forEach(function (input) {
      input.addEventListener('keydown', handleCapsLock);
      input.addEventListener('keyup', handleCapsLock);
    });
  }

  // DOMContentLoaded 이후 안전 동작.
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setup);
  } else {
    setup();
  }
})();</script></body></html>
